name: SEO Download Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  # Runs at 00:00 UTC every Monday
  schedule:
    - cron: '0 0 * * 1'

jobs:
  run-seo-script:
    runs-on: ubuntu-latest
    # Required to push changes back to the repository
    permissions:
      contents: write
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RYNX: ${{ secrets.RYNX }}
      PINTEREST_CLIENT_ID: ${{ secrets.PINTEREST_CLIENT_ID }}
      PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r SEO/requirements.txt

    - name: Install Playwright Browsers
      run: |
        pip install playwright
        playwright install --with-deps

    - name: Run SEO Script
      run: python SEO/download.py

    - name: Run Main Script
      run: python main.py

    - name: Commit and Push changes
      run: |
        # Configure Git with a generic bot identity
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add the specific folder (replace YOUR_FOLDER_NAME with your actual folder)
        # Using the folder name adds all subfolders and files inside it
        git add Data/Final_Strategy
        
        # Only commit if there are actual changes to avoid workflow errors
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update SEO data: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
