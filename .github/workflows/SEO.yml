name: SEO Download Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-seo-script:
    runs-on: ubuntu-latest
    # Map your secrets to environment variables here
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RYNX: ${{ secrets.RYNX }}
      # Add any other secrets your script needs below:
      # SECRET_NAME: ${{ secrets.SECRET_NAME }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Note: 3.14 is currently in pre-release/experimental

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r SEO/requirements.txt

    - name: Install Playwright Browsers
      run: |
        pip install playwright
        playwright install --with-deps

    - name: Run SEO Script
      run: python SEO/download.py
    - name: Run Main Script
      run: python main.py
